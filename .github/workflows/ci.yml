name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  UNILINK_CORE_REF: v0.8.7

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2022]
        python-version: ["3.8", "3.10", "3.12"]

    runs-on: ${{ matrix.os }}

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: "2"

    steps:
      - name: Checkout unilink-python
        uses: actions/checkout@v7

      - name: Checkout unilink core
        uses: actions/checkout@v7
        with:
          repository: jwsung91/unilink
          ref: ${{ env.UNILINK_CORE_REF }}
          path: unilink-core

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python build deps
        run: |
          python -m pip install -U pip
          python -m pip install pytest pytest-asyncio build scikit-build-core "pybind11>=2.11,<3"

      - name: Install system deps on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libboost-system-dev libboost-thread-dev libspdlog-dev

      - name: Install system deps on macOS
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - name: Checkout vcpkg
        if: runner.os == 'macOS' || runner.os == 'Windows'
        uses: actions/checkout@v7
        with:
          repository: microsoft/vcpkg
          path: vcpkg

      - name: Cache vcpkg packages
        if: runner.os == 'macOS' || runner.os == 'Windows'
        uses: actions/cache@v6
        with:
          path: |
            vcpkg/buildtrees
            vcpkg/downloads
            vcpkg/installed
            vcpkg/packages
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('.github/workflows/ci.yml', 'vcpkg/builtin-baseline', 'vcpkg/ports/boost-asio/**', 'vcpkg/ports/boost-system/**') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install vcpkg deps on macOS
        if: runner.os == 'macOS'
        run: |
          ./vcpkg/bootstrap-vcpkg.sh
          ./vcpkg/vcpkg install --classic boost-asio boost-system --triplet arm64-osx

      - name: Install vcpkg deps on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./vcpkg/bootstrap-vcpkg.bat
          ./vcpkg/vcpkg install --classic boost-asio boost-system --triplet x64-windows-static-md

      - name: Build and install package on Linux
        if: runner.os == 'Linux'
        run: |
          python -m pip install . \
            --config-settings=cmake.define.UNILINK_CORE_SOURCE_DIR=${{ github.workspace }}/unilink-core

      - name: Build and install package on macOS
        if: runner.os == 'macOS'
        run: |
          python -m pip install . \
            --config-settings=cmake.define.UNILINK_CORE_SOURCE_DIR=${{ github.workspace }}/unilink-core \
            --config-settings=cmake.define.CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
            --config-settings=cmake.define.VCPKG_TARGET_TRIPLET=arm64-osx

      - name: Build and install package on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install . `
            "--config-settings=cmake.define.UNILINK_CORE_SOURCE_DIR=${{ github.workspace }}/unilink-core" `
            "--config-settings=cmake.define.CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            "--config-settings=cmake.define.VCPKG_TARGET_TRIPLET=x64-windows-static-md"

      - name: Import smoke
        run: |
          python -c "import unilink; print(unilink.__version__)"
          python -c "import unilink_py"

      - name: Run tests
        env:
          UNILINK_PYTHON_RUN_LOOPBACK_TESTS: ${{ runner.os != 'Windows' && '1' || '' }}
        run: |
          python -m pytest -q -m "not serial"

  vcpkg-core:
    name: vcpkg core
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
      - name: Checkout unilink-python
        uses: actions/checkout@v7

      - name: Checkout vcpkg
        uses: actions/checkout@v7
        with:
          repository: microsoft/vcpkg
          path: vcpkg

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Bootstrap vcpkg
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Verify vcpkg package install
        run: scripts/verify.sh --skip-source

  installed-core:
    name: Installed core
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      UNILINK_INSTALL_PREFIX: /tmp/unilink-prefix

    steps:
      - name: Checkout unilink-python
        uses: actions/checkout@v7

      - name: Checkout unilink core
        uses: actions/checkout@v7
        with:
          repository: jwsung91/unilink
          ref: ${{ env.UNILINK_CORE_REF }}
          path: unilink-core

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libboost-system-dev libboost-thread-dev libspdlog-dev

      - name: Configure unilink core
        run: >
          cmake -S unilink-core -B build-unilink-install
          -DCMAKE_INSTALL_PREFIX=$UNILINK_INSTALL_PREFIX
          -DUNILINK_BUILD_TESTS=OFF
          -DUNILINK_BUILD_DOCS=OFF

      - name: Build unilink core
        run: cmake --build build-unilink-install --parallel

      - name: Install unilink core
        run: cmake --install build-unilink-install

      - name: Verify installed package install
        run: scripts/verify.sh --skip-source --skip-vcpkg --installed-prefix $UNILINK_INSTALL_PREFIX
