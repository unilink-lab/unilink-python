name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2022]
        python-version: ["3.8", "3.10", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout unilink-python
        uses: actions/checkout@v4

      - name: Checkout unilink core
        uses: actions/checkout@v4
        with:
          repository: jwsung91/unilink
          path: unilink-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python build deps
        run: |
          python -m pip install -U pip
          python -m pip install pytest build scikit-build-core pybind11

      - name: Install system deps on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Install system deps on macOS
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - name: Build and install package
        run: |
          python -m pip install . -Ccmake.define.UNILINK_CORE_SOURCE_DIR=${{ github.workspace }}/unilink-core

      - name: Import smoke
        run: |
          python -c "import unilink; print(unilink.__version__)"
          python -c "import unilink_py"

      - name: Run tests
        run: |
          python -m pytest -q -m "not serial"
