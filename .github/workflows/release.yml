name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name to build and publish"
        required: true
        default: "v0.8.9"
      upload:
        description: "Upload release assets to GitHub"
        type: boolean
        required: false
        default: true

permissions:
  contents: write

jobs:
  source-distribution:
    name: Source distribution
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout unilink-python
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build source distribution
        run: |
          python -m pip install -U pip
          python -m pip install build scikit-build-core "pybind11>=2.11,<3"
          python -m build --sdist --no-isolation

      - name: Upload source distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-sdist
          path: dist/*.tar.gz

  wheels:
    name: Wheel (${{ matrix.os_label }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            os_label: ubuntu-24.04-amd64
            python-version: "3.8"
          - os: ubuntu-24.04
            os_label: ubuntu-24.04-amd64
            python-version: "3.10"
          - os: ubuntu-24.04
            os_label: ubuntu-24.04-amd64
            python-version: "3.12"
          - os: macos-15
            os_label: macos-15-arm64
            python-version: "3.8"
          - os: macos-15
            os_label: macos-15-arm64
            python-version: "3.10"
          - os: macos-15
            os_label: macos-15-arm64
            python-version: "3.12"
          - os: windows-2022
            os_label: windows-amd64
            python-version: "3.8"
          - os: windows-2022
            os_label: windows-amd64
            python-version: "3.10"
          - os: windows-2022
            os_label: windows-amd64
            python-version: "3.12"

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: "2"

    steps:
      - name: Checkout unilink-python
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

      - name: Checkout unilink core
        uses: actions/checkout@v7
        with:
          repository: jwsung91/unilink
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          path: unilink-core

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python build deps
        run: |
          python -m pip install -U pip
          python -m pip install pytest scikit-build-core "pybind11>=2.11,<3"

      - name: Install system deps on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libboost-system-dev

      - name: Install system deps on macOS
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja

      - name: Checkout vcpkg
        if: runner.os == 'macOS' || runner.os == 'Windows'
        uses: actions/checkout@v7
        with:
          repository: microsoft/vcpkg
          path: vcpkg

      - name: Cache vcpkg packages
        if: runner.os == 'macOS' || runner.os == 'Windows'
        uses: actions/cache@v6
        with:
          path: |
            vcpkg/buildtrees
            vcpkg/downloads
            vcpkg/installed
            vcpkg/packages
          key: ${{ runner.os }}-vcpkg-release-${{ hashFiles('.github/workflows/release.yml', 'vcpkg/builtin-baseline', 'vcpkg/ports/boost-asio/**', 'vcpkg/ports/boost-system/**') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-release-
            ${{ runner.os }}-vcpkg-

      - name: Install vcpkg deps on macOS
        if: runner.os == 'macOS'
        run: |
          ./vcpkg/bootstrap-vcpkg.sh
          ./vcpkg/vcpkg install --classic boost-asio boost-system --triplet arm64-osx

      - name: Install vcpkg deps on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./vcpkg/bootstrap-vcpkg.bat
          ./vcpkg/vcpkg install --classic boost-asio boost-system --triplet x64-windows-static-md

      - name: Build wheel on Linux
        if: runner.os == 'Linux'
        run: |
          python -m pip wheel . --no-build-isolation -w dist \
            --config-settings=cmake.define.UNILINK_CORE_SOURCE_DIR=${{ github.workspace }}/unilink-core

      - name: Build wheel on macOS
        if: runner.os == 'macOS'
        run: |
          python -m pip wheel . --no-build-isolation -w dist \
            --config-settings=cmake.define.UNILINK_CORE_SOURCE_DIR=${{ github.workspace }}/unilink-core \
            --config-settings=cmake.define.CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
            --config-settings=cmake.define.VCPKG_TARGET_TRIPLET=arm64-osx

      - name: Build wheel on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip wheel . --no-build-isolation -w dist `
            "--config-settings=cmake.define.UNILINK_CORE_SOURCE_DIR=${{ github.workspace }}/unilink-core" `
            "--config-settings=cmake.define.CMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            "--config-settings=cmake.define.VCPKG_TARGET_TRIPLET=x64-windows-static-md"

      - name: Install wheel and run smoke tests
        if: runner.os != 'Windows'
        run: |
          python -m pip install dist/*.whl
          python -c "import unilink; print(unilink.__version__)"
          python -c "import unilink_py"
          python -m pytest -q -m "not serial and not integration"

      - name: Install wheel and run smoke tests on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist -Filter *.whl | Select-Object -First 1
          python -m pip install $wheel.FullName
          python -c "import unilink; print(unilink.__version__)"
          python -c "import unilink_py"
          python -m pytest -q -m "not serial and not integration"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-wheel-${{ matrix.os_label }}-py${{ matrix.python-version }}
          path: dist/*.whl

  publish:
    name: Publish GitHub release assets
    runs-on: ubuntu-24.04
    needs: [source-distribution, wheels]
    if: github.event_name == 'push' || inputs.upload == true || inputs.upload == 'true'

    steps:
      - name: Checkout unilink-python
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: |
          find release-assets -maxdepth 1 -type f -print | sort

      - name: Prepare release notes
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
        run: |
          cat > release-notes.md <<EOF
          ## unilink-python ${RELEASE_TAG}

          Release aligned with the matching unilink C++ core release line.

          See `CHANGELOG.md` for details.
          EOF

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
